name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-core:
    name: Build & Test (core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: Run tests with race detector and coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage threshold (≥85%)
        run: |
          go tool cover -func=coverage.out | grep "total:" | \
            awk '{if ($3+0 < 85.0) {print "Coverage " $3 " is below 85%"; exit 1} else {print "Coverage " $3 " OK"}}'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  test-adapters:
    name: Build & Test (${{ matrix.adapter }} adapter)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # gin v1.12.0 requires go 1.25 — use stable which resolves to the latest.
          - adapter: gin
            go-version: stable
          - adapter: echo
            go-version: "1.22"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        working-directory: adapters/${{ matrix.adapter }}
        run: go mod download

      - name: Verify dependencies
        working-directory: adapters/${{ matrix.adapter }}
        run: go mod verify

      - name: go vet
        working-directory: adapters/${{ matrix.adapter }}
        run: go vet ./...

      - name: Run tests with race detector
        working-directory: adapters/${{ matrix.adapter }}
        run: go test -race -count=1 ./...
